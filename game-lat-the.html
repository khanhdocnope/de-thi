<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lật Thẻ Học Thuật - EduHub Bank</title>
    <!-- CSS and Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .game-container-layout {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .game-stats-row {
            display: flex;
            justify-content: space-between;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 24px;
            margin-bottom: 24px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .stat-item span {
            color: var(--primary-light);
            font-size: 1.2rem;
            font-weight: 800;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            perspective: 1000px;
        }

        @media (max-width: 600px) {
            .memory-grid {
                gap: 10px;
            }
        }

        .memory-card {
            height: 110px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 12px;
            text-align: center;
            user-select: none;
        }

        .card-front {
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.95rem;
            transform: rotateY(180deg);
            box-shadow: var(--card-shadow);
        }

        .card-back {
            background: var(--bg-card-hover);
            color: var(--primary);
            font-size: 2rem;
        }

        .card-back::after {
            content: '?';
            font-size: 2.5rem;
            color: var(--text-muted);
            opacity: 0.3;
        }

        .memory-card.matched .card-front {
            border-color: var(--success);
            background: rgba(236, 72, 153, 0.05);
            color: var(--success);
        }
        
        [data-theme="light"] .memory-card.matched .card-front {
            background: rgba(5, 150, 105, 0.05);
            border-color: var(--success);
            color: var(--success);
        }

        /* Success modal overlay */
        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .win-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .win-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: var(--card-shadow);
        }

        .win-icon {
            font-size: 4rem;
            color: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-container">
                <a href="./" class="logo-area">
                    <img src="https://i.ibb.co/Y4crHd7B/icon-edu-Hub.jpg" alt="EduHub Logo" class="logo-img">
                    <span class="logo-text">EduHub Bank</span>
                </a>
                
                <nav class="breadcrumb-nav">
                    <a href="./" class="breadcrumb-item">Trang chủ</a>
                    <i data-lucide="chevron-right" class="breadcrumb-sep"></i>
                    <span class="breadcrumb-item active">Lật thẻ học thuật</span>
                </nav>

                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle-btn" title="Chuyển chế độ sáng/tối">
                        <i data-lucide="sun" class="sun-icon"></i>
                        <i data-lucide="moon" class="moon-icon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="game-container-layout">
            <div class="subject-hero">
                <div class="subject-hero-details">
                    <div class="utility-icon" style="width:50px; height:50px; border-radius:12px;">
                        <i data-lucide="brain"></i>
                    </div>
                    <div>
                        <h1 class="subject-hero-title">Lật Thẻ Học Thuật</h1>
                        <p class="subject-hero-desc">Hãy ghép các cặp công thức hóa học, vật lý hoặc ký hiệu toán học tương ứng với nhau!</p>
                    </div>
                </div>
            </div>

            <!-- Stats dashboard -->
            <div class="game-stats-row">
                <div class="stat-item">
                    <i data-lucide="timer"></i> Thời gian: <span id="game-time">00:00</span>
                </div>
                <div class="stat-item">
                    <i data-lucide="git-commit"></i> Lượt lật: <span id="game-moves">0</span>
                </div>
                <div class="stat-item">
                    <i data-lucide="award"></i> Điểm: <span id="game-score">0</span>
                </div>
            </div>

            <!-- Memory Grid -->
            <div class="memory-grid" id="memory-grid">
                <!-- Dynamic cards will be created here -->
            </div>
        </main>
    </div>

    <!-- Win Modal Overlay -->
    <div class="win-overlay" id="win-overlay">
        <div class="win-content">
            <i data-lucide="trophy" class="win-icon" style="width: 80px; height: 80px;"></i>
            <h2 class="section-title" style="font-size: 1.8rem; margin: 0;">Chúc mừng bạn!</h2>
            <p class="quote-text" style="text-align: center;">Bạn đã hoàn thành thử thách ghi nhớ học thuật xuất sắc.</p>
            <div style="display: flex; gap: 24px; margin: 8px 0;">
                <div><strong>Lượt lật:</strong> <span id="final-moves" style="color: var(--primary-light);">0</span></div>
                <div><strong>Thời gian:</strong> <span id="final-time" style="color: var(--primary-light);">0s</span></div>
            </div>
            <button class="btn-primary" id="btn-restart" style="width: 100%; justify-content: center; padding: 12px;">
                <i data-lucide="play"></i> Chơi lại
            </button>
        </div>
    </div>

    <!-- Game Script -->
    <script>
        // Set up theme switcher
        const themeToggleBtn = document.getElementById("theme-toggle");
        const currentTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", currentTheme);
        
        themeToggleBtn.addEventListener("click", () => {
            const nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", nextTheme);
            localStorage.setItem("theme", nextTheme);
        });

        // Academic card pairs: formula <-> concept
        const CARD_DATA = [
            { id: 1, val: "H₂O", pairId: "water" },
            { id: 2, val: "Nước nguyên chất", pairId: "water" },
            { id: 3, val: "NaCl", pairId: "salt" },
            { id: 4, val: "Muối ăn", pairId: "salt" },
            { id: 5, val: "E = mc²", pairId: "einstein" },
            { id: 6, val: "Thuyết tương đối", pairId: "einstein" },
            { id: 7, val: "F = ma", pairId: "newton" },
            { id: 8, val: "Định luật II Newton", pairId: "newton" },
            { id: 9, val: "π", pairId: "pi" },
            { id: 10, val: "3.14159...", pairId: "pi" },
            { id: 11, val: "CO₂", pairId: "carbon" },
            { id: 12, val: "Khí cacbonic", pairId: "carbon" },
            { id: 13, val: "Fe", pairId: "iron" },
            { id: 14, val: "Kim loại Sắt", pairId: "iron" },
            { id: 15, val: "i", pairId: "imaginary" },
            { id: 16, val: "Số ảo (√-1)", pairId: "imaginary" }
        ];

        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matchedPairs = 0;
        let moves = 0;
        let score = 0;
        let timeElapsed = 0;
        let timerInterval = null;
        let gameStarted = false;

        const gridEl = document.getElementById("memory-grid");
        const movesEl = document.getElementById("game-moves");
        const scoreEl = document.getElementById("game-score");
        const timerEl = document.getElementById("game-time");
        const winOverlay = document.getElementById("win-overlay");

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeElapsed++;
                const mins = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
                const secs = String(timeElapsed % 60).padStart(2, '0');
                timerEl.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function createBoard() {
            gridEl.innerHTML = "";
            const shuffled = shuffle([...CARD_DATA]);
            shuffled.forEach(data => {
                const card = document.createElement("div");
                card.className = "memory-card";
                card.dataset.pairId = data.pairId;
                card.dataset.val = data.val;
                
                card.innerHTML = `
                    <div class="card-face card-front">${data.val}</div>
                    <div class="card-face card-back"></div>
                `;
                
                card.addEventListener("click", flipCard);
                gridEl.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            if (!gameStarted) {
                gameStarted = true;
                startTimer();
            }

            this.classList.add("flipped");

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesEl.textContent = moves;

            checkMatch();
        }

        function checkMatch() {
            const isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;
            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add("matched");
            secondCard.classList.add("matched");
            
            score += 10;
            scoreEl.textContent = score;
            matchedPairs++;

            resetBoard();

            if (matchedPairs === CARD_DATA.length / 2) {
                endGame();
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove("flipped");
                secondCard.classList.remove("flipped");
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById("final-moves").textContent = moves;
            document.getElementById("final-time").textContent = `${timeElapsed}s`;
            setTimeout(() => {
                winOverlay.classList.add("show");
            }, 500);
        }

        function restartGame() {
            winOverlay.classList.remove("show");
            clearInterval(timerInterval);
            timeElapsed = 0;
            moves = 0;
            score = 0;
            matchedPairs = 0;
            gameStarted = false;
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            
            timerEl.textContent = "00:00";
            movesEl.textContent = "0";
            scoreEl.textContent = "0";
            
            createBoard();
        }

        document.getElementById("btn-restart").addEventListener("click", restartGame);
        
        // Init Game
        createBoard();
        lucide.createIcons();
    </script>
</body>
</html>
